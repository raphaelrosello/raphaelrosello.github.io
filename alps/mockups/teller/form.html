<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>New DCR entry · ALPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/app.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body data-active="teller" data-base="../" data-title="New DCR entry" data-crumbs="Teller / DCR>teller/index.html|New entry">
<main id="page" class="p-4 sm:p-6 lg:p-8" x-data="{type:'cash', notIncl:false}">

  <div class="flex items-center gap-3 mb-5">
    <a href="index.html" class="btn btn-ghost px-2"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div><h2 class="text-lg font-semibold text-gray-900">New cash-received entry</h2>
      <p class="text-sm text-gray-500">Records into <code>Teller_Rep</code> with cash/check + "not included" flags</p></div>
  </div>

  <div class="max-w-2xl">
    <div class="card p-5 space-y-4">
      <div class="grid sm:grid-cols-2 gap-4">
        <div><label class="label">Date</label><input class="input" type="date" value="2026-06-15"></div>
        <div><label class="label">Time</label><input class="input" type="time" value="18:52"></div>
        <div><label class="label">Bus</label><select class="input"><option>0123</option><option>0241</option><option>4501</option><option>4732</option></select></div>
        <div><label class="label">Bus category</label><select class="input"><option>Aircon — Batangas</option><option>Ordinary — Batangas</option><option>Aircon — San Juan</option><option>Ordinary — Lemery</option></select></div>
        <div><label class="label">Teller</label><input class="input" value="teller-bat-2"></div>
        <div><label class="label">Route</label><select class="input"><option>Batangas</option><option>RORO</option><option>BICOL</option><option>San Juan</option></select></div>
        <div><label class="label">Reference (OR / Check #)</label><input class="input" placeholder="OR-44120"></div>
        <div><label class="label">Amount</label><input class="input tnum" type="number" placeholder="0.00"></div>
      </div>

      <div>
        <label class="label">Payment type</label>
        <div class="flex gap-2">
          <button type="button" @click="type='cash'" class="btn" :class="type==='cash'?'btn-primary':'btn-ghost'">Cash</button>
          <button type="button" @click="type='check'" class="btn" :class="type==='check'?'btn-primary':'btn-ghost'">Check</button>
        </div>
      </div>

      <label class="flex items-center gap-2.5 p-3 rounded-lg border" :class="notIncl?'border-amber-300 bg-amber-50':'border-gray-200'"
             :style="type==='check' ? '' : 'opacity:.45;pointer-events:none'">
        <input type="checkbox" x-model="notIncl" class="h-4 w-4 rounded border-gray-300 text-indigo-600">
        <span class="text-sm"><span class="font-medium text-gray-800">Check not included</span>
          <span class="text-gray-500">— exclude this check from the cash/deposit total (only applies to checks)</span></span>
      </label>

      <div class="flex items-center gap-2 pt-1">
        <span class="text-sm text-gray-500">Will be stored as:</span>
        <span class="badge" :class="type==='cash'?'badge-green':(notIncl?'badge-amber':'badge-blue')"
              x-text="type==='cash' ? 'Cash (fCash=1)' : (notIncl ? 'Check · not included (fCheck=1, fCash=0)' : 'Check (fCheck=1)')"></span>
      </div>
    </div>

    <div class="flex justify-end gap-2 mt-5">
      <a href="index.html" class="btn btn-ghost">Cancel</a>
      <button class="btn btn-primary">Save entry</button>
    </div>
  </div>
</main>

<script src="../assets/data.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
