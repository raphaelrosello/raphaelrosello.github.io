<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>New Journal entry · ALPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/app.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
function gj(){
  return {
    accounts: (window.ALPS && window.ALPS.accounts) || [],
    book:'GJ', route:'Batangas', date:'2026-06-15', particular:'',
    lines:[ {acct:'24011', dr:8420, cr:0}, {acct:'10000-CB1', dr:0, cr:8420} ],
    fmt(n){ n=Math.round((n+Number.EPSILON)*100)/100; let s=Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); return s; },
    add(){ this.lines.push({acct:'', dr:0, cr:0}); },
    del(i){ this.lines.splice(i,1); },
    get totDr(){ return this.lines.reduce((s,l)=>s+(+l.dr||0),0); },
    get totCr(){ return this.lines.reduce((s,l)=>s+(+l.cr||0),0); },
    get diff(){ return Math.round((this.totDr-this.totCr)*100)/100; },
    get balanced(){ return this.diff===0 && this.totDr>0; },
  };
}
</script>
</head>
<body data-active="journal" data-base="../" data-title="New Journal entry" data-crumbs="General Journal>journal/index.html|New entry">
<main id="page" class="p-4 sm:p-6 lg:p-8" x-data="gj()">

  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div class="flex items-center gap-3">
      <a href="index.html" class="btn btn-ghost px-2"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
      <div><h2 class="text-lg font-semibold text-gray-900">New journal entry</h2>
        <p class="text-sm text-gray-500">Must balance before posting</p></div>
    </div>
    <button class="btn btn-primary" :disabled="!balanced" :style="!balanced?'opacity:.5;cursor:not-allowed':''">Post entry</button>
  </div>

  <div class="card p-5 mb-4">
    <div class="grid sm:grid-cols-4 gap-4">
      <div><label class="label">Date</label><input class="input" type="date" x-model="date"></div>
      <div><label class="label">Book</label><select class="input" x-model="book"><option>GJ</option><option>CRJ</option><option>CHDJ</option><option>CADJ</option></select></div>
      <div><label class="label">Route</label><select class="input" x-model="route"><option>Batangas</option><option>RORO</option><option>BICOL</option><option>San Juan</option></select></div>
      <div><label class="label">Reference</label><input class="input" placeholder="optional"></div>
      <div class="sm:col-span-4"><label class="label">Particular</label><input class="input" x-model="particular" placeholder="Description of entry"></div>
    </div>
  </div>

  <div class="card overflow-hidden">
    <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100">
      <h3 class="font-semibold text-gray-900 text-sm">Lines</h3>
      <button type="button" @click="add()" class="btn btn-ghost text-xs py-1">+ Add line</button>
    </div>
    <div class="overflow-x-auto">
      <table class="grid">
        <thead><tr><th style="min-width:18rem">Account</th><th class="num">Debit</th><th class="num">Credit</th><th></th></tr></thead>
        <tbody>
          <template x-for="(l,i) in lines" :key="i">
            <tr>
              <td><select class="input" x-model="l.acct" x-init="$nextTick(() => $el.value = l.acct)">
                <template x-for="a in accounts" :key="a.sub"><option :value="a.sub" x-text="a.sub + ' · ' + a.name"></option></template>
              </select></td>
              <td><input class="input tnum num" style="width:8rem" type="number" x-model.number="l.dr" @input="if(l.dr) l.cr=0"></td>
              <td><input class="input tnum num" style="width:8rem" type="number" x-model.number="l.cr" @input="if(l.cr) l.dr=0"></td>
              <td><button type="button" @click="del(i)" class="text-gray-400 hover:text-rose-600"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12M9 7V5h6v2M8 7l1 12h6l1-12"/></svg></button></td>
            </tr>
          </template>
        </tbody>
        <tfoot><tr><td class="text-right">Totals</td><td class="num tnum" x-text="fmt(totDr)"></td><td class="num tnum" x-text="fmt(totCr)"></td><td></td></tr></tfoot>
      </table>
    </div>
    <div class="px-5 py-3 border-t flex items-center gap-2 text-sm"
         :class="balanced?'bg-emerald-50 border-emerald-100 text-emerald-700':'bg-rose-50 border-rose-100 text-rose-700'">
      <template x-if="balanced">
        <span class="flex items-center gap-2"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg><span class="font-medium">Balanced</span> — debits equal credits.</span>
      </template>
      <template x-if="!balanced">
        <span class="flex items-center gap-2"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
          <span class="font-medium">Unbalanced</span> — difference <span class="tnum" x-text="fmt(diff)"></span>.</span>
      </template>
    </div>
  </div>
</main>

<script src="../assets/data.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
