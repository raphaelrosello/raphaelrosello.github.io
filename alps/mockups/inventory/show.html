<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Material Requisition · ALPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/app.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body data-active="inventory" data-base="../" data-title="Material Requisition" data-crumbs="Inventory>inventory/index.html|Requisition">
<main id="page" class="p-4 sm:p-6 lg:p-8" x-data="{items:[
  {code:'ENG-0142', desc:'Oil filter — J08E', qty:4, avail:64, type:'Brand New'},
  {code:'CHM-0031', desc:'AdBlue 10L', qty:2, avail:9, type:'Brand New'}
], nt:{code:'',desc:'',qty:null,avail:0,type:'Brand New'},
  add(){ if(this.nt.code){ this.items.push(Object.assign({},this.nt)); this.nt={code:'',desc:'',qty:null,avail:0,type:'Brand New'}; } },
  del(i){ this.items.splice(i,1); } }">

  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div class="flex items-center gap-3">
      <a href="index.html" class="btn btn-ghost px-2"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
      <div><h2 class="text-lg font-semibold text-gray-900">Material requisition</h2>
        <p class="text-sm text-gray-500">Maintenance department · issue parts against a bus</p></div>
    </div>
    <button class="btn btn-primary">Submit requisition</button>
  </div>

  <div class="card p-5 mb-4">
    <div class="grid sm:grid-cols-4 gap-4">
      <div><label class="label">Date</label><input class="input" type="date" value="2026-06-15"></div>
      <div><label class="label">Department</label><input class="input" value="Maintenance"></div>
      <div><label class="label">Bus / plate</label><select class="input"><option>N-7067 · ABC-7067</option><option>0123 · DEF-0123</option><option>4501 · GHI-4501</option></select></div>
      <div><label class="label">Route</label><select class="input"><option>Batangas</option><option>RORO</option><option>BICOL</option><option>San Juan</option></select></div>
      <div class="sm:col-span-2"><label class="label">Purpose</label><input class="input" placeholder="e.g. scheduled PMS"></div>
      <div class="sm:col-span-2"><label class="label">Requested by</label><input class="input" placeholder="Shop foreman"></div>
    </div>
  </div>

  <div class="card overflow-hidden">
    <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100"><h3 class="font-semibold text-gray-900 text-sm">Items</h3></div>
    <div class="overflow-x-auto">
      <table class="grid">
        <thead><tr><th>Code</th><th>Description</th><th>Type</th><th class="num">Qty</th><th class="num">Available</th><th></th></tr></thead>
        <tbody>
          <template x-for="(it,i) in items" :key="i">
            <tr>
              <td class="tnum" x-text="it.code"></td><td x-text="it.desc"></td>
              <td><span class="badge badge-gray" x-text="it.type"></span></td>
              <td class="num tnum" x-text="it.qty"></td>
              <td class="num tnum" :class="it.qty>it.avail?'text-rose-600':''" x-text="it.avail"></td>
              <td class="num"><button @click="del(i)" class="text-gray-400 hover:text-rose-600"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12M9 7V5h6v2M8 7l1 12h6l1-12"/></svg></button></td>
            </tr>
          </template>
          <tr class="bg-gray-50">
            <td><input class="input tnum" style="width:7rem" placeholder="code" x-model="nt.code"></td>
            <td><input class="input" placeholder="description" x-model="nt.desc"></td>
            <td><select class="input" x-model="nt.type"><option>Brand New</option><option>Reconditioned</option><option>Recap</option></select></td>
            <td><input class="input tnum num" style="width:5rem" type="number" x-model.number="nt.qty"></td>
            <td><input class="input tnum num" style="width:5rem" type="number" x-model.number="nt.avail"></td>
            <td><button @click="add()" class="btn btn-primary text-xs py-1 px-2.5">Add</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="../assets/data.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
