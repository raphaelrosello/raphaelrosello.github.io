<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Disbursement Voucher · ALPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../assets/app.css">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
function voucher(){
  return {
    accounts:(window.ALPS && window.ALPS.accounts.filter(a=>!a.sub.startsWith('10000'))) || [],
    kind:'CHDJ', date:'2026-06-15', route:'San Juan', payee:'', particular:'', vno:'CHK-100482',
    lines:[ {acct:'24011', amt:8420} ],
    fmt(n){ n=Math.round((n+Number.EPSILON)*100)/100; return Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); },
    add(){ this.lines.push({acct:'', amt:0}); }, del(i){ this.lines.splice(i,1); },
    get total(){ return this.lines.reduce((s,l)=>s+(+l.amt||0),0); },
    get creditAcct(){ return this.kind==='CHDJ' ? '10000-CB1 · Cash in Bank' : '10000-PC · Petty Cash'; },
  };
}
</script>
</head>
<body data-active="books" data-base="../" data-title="Disbursement Voucher" data-crumbs="Books of Accounts>books/index.html|New voucher">
<main id="page" class="p-4 sm:p-6 lg:p-8" x-data="voucher()">

  <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
    <div class="flex items-center gap-3">
      <a href="index.html" class="btn btn-ghost px-2"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></a>
      <div><h2 class="text-lg font-semibold text-gray-900">New disbursement voucher</h2>
        <p class="text-sm text-gray-500">Posts to the journal with an auto cash-credit leg, linked by voucher #</p></div>
    </div>
    <button class="btn btn-primary">Save &amp; post</button>
  </div>

  <div class="max-w-3xl space-y-5">
    <div class="card p-5">
      <div class="flex items-center gap-2 mb-4">
        <div class="inline-flex rounded-lg border border-gray-300 p-0.5">
          <button type="button" @click="kind='CHDJ'; vno='CHK-100482'" class="px-3 py-1.5 text-sm rounded-md" :class="kind==='CHDJ'?'bg-indigo-600 text-white':'text-gray-600'">Check voucher (CHDJ)</button>
          <button type="button" @click="kind='CADJ'; vno='CA-00731'" class="px-3 py-1.5 text-sm rounded-md" :class="kind==='CADJ'?'bg-indigo-600 text-white':'text-gray-600'">Cash advance (CADJ)</button>
        </div>
      </div>
      <div class="grid sm:grid-cols-2 gap-4">
        <div><label class="label">Voucher #</label><input class="input" x-model="vno"></div>
        <div><label class="label">Date</label><input class="input" type="date" x-model="date"></div>
        <div><label class="label">Payee</label><input class="input" x-model="payee" placeholder="Supplier / employee"></div>
        <div><label class="label">Route</label><select class="input" x-model="route"><option>Batangas</option><option>RORO</option><option>BICOL</option><option>San Juan</option></select></div>
        <div class="sm:col-span-2"><label class="label">Particular</label><input class="input" x-model="particular" placeholder="Purpose of disbursement"></div>
      </div>
    </div>

    <div class="card overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100">
        <h3 class="font-semibold text-gray-900 text-sm">Debit lines</h3>
        <button type="button" @click="add()" class="btn btn-ghost text-xs py-1">+ Add line</button>
      </div>
      <table class="grid">
        <thead><tr><th style="min-width:18rem">Account (debit)</th><th class="num">Amount</th><th></th></tr></thead>
        <tbody>
          <template x-for="(l,i) in lines" :key="i">
            <tr>
              <td><select class="input" x-model="l.acct" x-init="$nextTick(() => $el.value = l.acct)">
                <template x-for="a in accounts" :key="a.sub"><option :value="a.sub" x-text="a.sub+' · '+a.name"></option></template>
              </select></td>
              <td><input class="input tnum num" style="width:9rem" type="number" x-model.number="l.amt"></td>
              <td><button type="button" @click="del(i)" class="text-gray-400 hover:text-rose-600"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7h12M9 7V5h6v2M8 7l1 12h6l1-12"/></svg></button></td>
            </tr>
          </template>
          <tr class="bg-gray-50">
            <td class="font-medium text-gray-700">Credit · <span x-text="creditAcct"></span> <span class="badge badge-gray">auto</span></td>
            <td class="num tnum font-semibold" x-text="fmt(total)"></td><td></td>
          </tr>
        </tbody>
        <tfoot><tr><td>Voucher total</td><td class="num tnum" x-text="fmt(total)"></td><td></td></tr></tfoot>
      </table>
    </div>
    <p class="text-xs text-gray-400">The credit leg is generated automatically to the cash account for the chosen book
      (<span x-text="kind==='CHDJ'?'Cash in Bank':'Petty Cash'"></span>) and posts to <span x-text="kind"></span> under voucher # <span x-text="vno"></span>.</p>
  </div>
</main>

<script src="../assets/data.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
